<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Furs Things First</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;
    background:
        radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, #ff7a18, #ff5400);
}

/* NAV */
nav {
    display: flex;
    justify-content: flex-end;
    padding: 20px 40px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 700;
}

/* LOGO */
.top-logo {
    text-align: center;
}
.top-logo img {
    width: 200px;
}

/* HEADER */
.header {
    text-align: center;
}
.header h1 {
    font-size: 40px;
}

/* CONTACT BOX */
.contact-box {
    max-width: 700px;
    margin: 40px auto;
    padding: 40px;
    border: 4px solid #2dd4bf;
    border-radius: 12px;
    text-align: center;
}

/* TEXT */
.contact-box h2 {
    margin-bottom: 5px;
}

.contact-box p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* EMAIL ROW */
.email-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* ICON */
.icon {
    width: 20px;
}

/* SOCIALS */
.socials {
    margin-top: 20px;
}

.socials img {
    width: 45px;
    margin: 10px;
    transition: 0.2s;
}

.socials img:hover {
    transform: scale(1.1);
}

/* MOBILE */
@media(max-width:768px){
    .contact-box {
        margin:20px;
        padding:25px;
    }
}

footer {
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="training.html">Dog Training</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- LOGO -->
<div class="top-logo">
    <img src="logo.png" alt="Logo">
</div>

<!-- HEADER -->
<div class="header">
    <h1>GET IN TOUCH</h1>
</div>

<!-- CONTACT BOX -->
<div class="contact-box">

    <!-- NAME + PHONE -->
    <h2>Adam Murphy</h2>
    <p>📞085 137 4535</p>

    <!-- EMAIL WITH ICON -->
    <div class="email-row">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" class="icon">
        <p>fursthingsfirst1@gmail.com</p>
    </div>

    <!-- SOCIAL LINKS -->
    <div class="socials">

        <!-- WHATSAPP -->
        <a href="https://wa.me/353871234567?text=Hi%20I%27m%20interested%20in%20dog%20training" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        </a>

        <!-- INSTAGRAM -->
        <a href="https://www.instagram.com/furs_things_first/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
        </a>

        <!-- FACEBOOK (TEMP - replace later with clean link) -->
        <a href="https://www.facebook.com/share/1BnwsN5Z4q/?mibextid=wwXIfr" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
        </a>

    </div>

</div>

<footer>
    © 2026 Furs Things First
</footer>

</body>
</html>
