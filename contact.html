<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Furs Things First</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;

    background:
        radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, #ff7a18, #ff5400);

    background-size: 4px 4px, cover;
}

/* NAV */
nav {
    display: flex;
    justify-content: flex-end;
    padding: 20px 40px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 700;
}

nav a:hover {
    text-decoration: underline;
}

/* HEADER */
.header {
    text-align: center;
    margin-top: 20px;
}

.header h1 {
    font-size: 50px;
}

/* CONTACT BOX */
.contact-box {
    max-width: 700px;
    margin: 40px auto;
    padding: 40px;
    border: 4px solid #2dd4bf;
    border-radius: 12px;
    text-align: center;
}

/* TEXT */
.contact-box h2 {
    margin-bottom: 5px;
}

.contact-box p {
    margin-bottom: 20px;
    font-size: 18px;
}

/* SOCIALS */
.socials {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
}

.socials img {
    width: 50px;
    height: 50px;
    transition: 0.2s;
    cursor: pointer;
}

.socials img:hover {
    transform: scale(1.1);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="training.html">Dog Training</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- HEADER -->
<div class="header">
    <h1>GET IN TOUCH</h1>
</div>

<!-- CONTACT BOX -->
<div class="contact-box">

    <!-- NAME + PHONE -->
    <h2>Your Name</h2>
    <p>📞 087 123 4567</p>

    <!-- EMAIL -->
    <h2>Email</h2>
    <p>your@email.com</p>

    <!-- SOCIAL LINKS -->
    <div class="socials">

        <!-- WHATSAPP -->
        <a href="https://wa.me/353871234567?text=Hi%20I%27m%20interested%20in%20dog%20training" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        </a>

        <!-- INSTAGRAM -->
        <a href="https://instagram.com/yourusername" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
        </a>

        <!-- FACEBOOK -->
        <a href="https://facebook.com/yourpage" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
        </a>

    </div>

</div>

<footer>
    © 2026 Furs Things First
</footer>

</body>
</html>
