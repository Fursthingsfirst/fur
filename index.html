<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furs Things First</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;
    background:
        radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, #ff7a18, #ff5400);
    background-size: 4px 4px, cover;
}

nav {
    display: flex;
    justify-content: flex-end;
    padding: 20px;
}
nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

.top-logo {
    text-align: center;
}
.top-logo img {
    width: 200px;
}

.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 4px solid #2dd4bf;
    margin: 20px;
    padding: 60px;
    border-radius: 12px;
}

.hero-text h2 {
    font-size: 70px;
    margin: 0;
}

.hero-text button {
    margin-top: 20px;
    padding: 14px;
    border: 2px solid white;
    background: transparent;
    color: white;
}

.slider {
    width: 300px;
    height: 300px;
    position: relative;
}
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: 1s;
}
.slide.active { opacity: 1; }

.section {
    padding: 40px;
}
.cards {
    display: flex;
    gap: 20px;
}
.card {
    border: 2px solid white;
    padding: 20px;
    flex: 1;
}

footer { text-align:center; padding:20px; }

/* MOBILE */
@media(max-width:768px){
    .hero { flex-direction:column; padding:30px; }
    .hero-text h2 { font-size:40px; }
    .slider { width:100%; height:200px; margin-top:20px;}
    .cards { flex-direction:column; }
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="training.html">Dog Training</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="top-logo">
<img src="logo.png">
</div>

<section class="hero">

<div class="hero-text">
<h2>FURS<br>THINGS<br>FIRST</h2>
<p>Calm dogs. Clear communication. Real results.</p>

<a href="https://wa.me/353851374535" target="_blank">
<button>BOOK A CONSULTATION NOW</button>
</a>
</div>

<div class="slider">
<img src="dog1.jpeg" class="slide active">
<img src="dog2.jpeg" class="slide">
<img src="dog3.jpeg" class="slide">
</div>

</section>

<section class="section">
<h2>OUR SERVICES</h2>
<div class="cards">
<div class="card">Puppy Training</div>
<div class="card">Behaviour Fixes</div>
<div class="card">1-to-1 Coaching</div>
</div>
</section>

<footer>© 2026 Furs Things First</footer>

<script>
let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},5000);
</script>

</body>
</html>
